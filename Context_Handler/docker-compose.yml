# gehört zu Context_Handler
# Das Context_Handler directory wurde vollständig von Marvin Palsbröker erstellt

services:
  rag-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-bot-app
    runtime: runc
    ports:
      - "5000:5000"
    volumes:
      - hf_cache:/opt/hf-cache
    environment:
      - FLASK_APP=Context_Webserver.py
      - FLASK_ENV=production
      - HF_HOME=/opt/hf-cache
      - HF_HUB_CACHE=/opt/hf-cache/hub
      - SENTENCE_TRANSFORMERS_HOME=/opt/hf-cache/sentence-transformers
      # Qdrant Vector Database Environment Variables
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - WEBSERVER_TOKEN=${WEBSERVER_TOKEN}
    restart: unless-stopped
    # Memory und CPU Limits
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

# wichtig es muss erst einmal über das root compose das Volume erstellt werden
# Also muss initial erstmal das darüberliegende compose ausgeführt werden
# Das hat den sinn dass man das modell nicht doppelt runterladen musss und in den 
# volumes vorliegt. 9 GB reichen müssen nicht 18 sein

# das modell muss hierbei nicht runtergeladen sein.
# Das wird duch warm_model_cache.py automatisch in das verzeichnis heruntergeladen
volumes:
  hf_cache:
    external: true
    name: field-service-rag-bot_hf_cache