name: Deploy to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Saubere Deploy-Kopie bauen
        run: |
          mkdir deploy
          rsync -av . deploy \
            --exclude .git \
            --exclude .github \
            --exclude "README.md" \
            --exclude "*.pdf" \
            --exclude "*.PDF" \
            --exclude "*.docx" \
            --exclude "*.pptx" \
            --exclude "*.zip" \
            --exclude "*.sqlite" \
            --exclude "*.db" \
            --exclude "*.faiss" \
            --exclude "DB/" \
            --exclude "data/" \
            --exclude "chroma/"

      - name: Frisches Git nur fuer Deploy initialisieren
        run: |
          cd deploy
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy clean copy to Hugging Face Space"

      - name: In Space pushen
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd deploy
          git push --force https://RAG-FSM-Bot123:$HF_TOKEN@huggingface.co/spaces/RAG-FSM-Bot123/field-service-rag-bot main
