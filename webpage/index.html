<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Service RAG Bot</title>
    <link rel="stylesheet" href="styles.css">
    <!-- scripte zur darstellung von markdown-->
    <script src="marked.umd.js"></script>
    <script src="purify.min.js"></script>
    <!-- normales javascript für ui funktionen und server calls -->
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Field Service Rag Bot für Miele Geräte</h1>
    <p>Dieser Bot hilft bei der Fehlersuche und Diagnose von Miele Geräten.</p>

    <!-- hell/dunkel toggle + TTS toggle -->
    <div class="controls">
        <button id="tts-toggle" title="Text-to-Speech">🔇</button>
        <button id="theme-toggle" title="Dark/Light Mode">☀️</button>
    </div>

    <!-- chat fenster -->
    <div id="chat-container">

        <!-- div für nachrichten, mit scroll down button, werden aus dem js befüllt -->
        <div id="chat-box">
            <button id="scroll-down-btn" title="Zum Neuesten">⬇</button>
        </div>

        <!-- Eingabezeile: Textfeld + Mikrofon-Button + Senden-Button -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Nachricht eingeben...">
            <button id="mic-button" title="Spracheingabe">🎤</button>
            <button id="send-button">Senden</button>
        </div>

    </div>
</body>
</html>
