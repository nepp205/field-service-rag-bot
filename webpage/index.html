<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Service RAG Bot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Welcome to the Field Service RAG Bot</h1>
    <p>This is a simple web interface for interacting with the RAG bot.</p>
    <div id="chat-container">
        <div id="chat-box"></div>

        <!-- input-area groups input + button so they sit on the same row under the chat -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here...">
            <button id="send-button">Send</button>
        </div>
    </div>
    
   


    

</body>

</html>
