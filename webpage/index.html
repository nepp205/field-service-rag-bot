<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Service RAG Bot</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Lokal gebundelt damit Docker ohne Internet funktioniert -->
    <script src="marked.umd.js"></script>
    <script src="purify.min.js"></script>
    <!-- defer: JS läuft erst wenn DOM fertig ist -->
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Welcome to the Field Service RAG Bot</h1>
    <p>This is a simple web interface for interacting with the RAG bot.</p>

    <!-- Theme- und TTS-Buttons oben rechts (fixed) -->
    <div class="controls">
        <button id="tts-toggle" title="Text-to-Speech">🔇</button>
        <button id="theme-toggle" title="Dark/Light Mode">☀️</button>
    </div>

    <!-- Chat-Bereich -->
    <div id="chat-container">

        <!-- Scrollbare Nachrichtenliste mit Scroll-Button -->
        <div id="chat-box">
            <button id="scroll-down-btn" title="Zum Neuesten">⬇</button>
        </div>

        <!-- Eingabezeile: Textfeld + Mikrofon + Senden -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here...">
            <button id="mic-button" title="Spracheingabe">🎤</button>
            <button id="send-button">Send</button>
        </div>

    </div>
</body>
</html>
