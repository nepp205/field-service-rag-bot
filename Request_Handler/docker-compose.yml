# Von GitHub Copilot generiert, angepasst von Niklas
services:
  request-handler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: request-handler-cont
    ports:
      - "8000:8000"  # port nach außen freigeben
    env_file:
      - .env  # umgebungsvariablen aus datei laden
    restart: unless-stopped  # automatisch neustarten außer bei manuellem stopp
